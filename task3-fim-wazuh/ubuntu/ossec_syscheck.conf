<!-- ==========================================================================
     ossec_syscheck.conf — Ubuntu Agent FIM Configuration
     CSE804: Network and Internet Security — Task 3
     
     This snippet goes inside the <syscheck> block of:
       /var/ossec/etc/ossec.conf
     
     APPLY ON: Ubuntu 20.04 Wazuh Agent (IP: 10.33.3.2)
     
     After editing, restart the agent:
       sudo systemctl restart wazuh-agent
     ========================================================================== -->

<ossec_config>

  <!-- =========================================================
       File Integrity Monitoring (FIM) — syscheck configuration
       ========================================================= -->
  <syscheck>

    <!-- FIM is enabled (not disabled) -->
    <disabled>no</disabled>

    <!-- Scan frequency in seconds (default: every 12 hours = 43200) -->
    <!-- Set lower for lab/testing; raise in production -->
    <frequency>300</frequency>

    <!-- Scan on startup -->
    <scan_on_start>yes</scan_on_start>

    <!-- -------------------------------------------------------
         Monitored Directories
         
         Attributes:
           check_all="yes"        — check permissions, owner, MD5, SHA1, SHA256
           report_changes="yes"   — report the diff of text file changes
           realtime="yes"         — use inotify for real-time monitoring
                                    (requires Linux kernel inotify support)
         ------------------------------------------------------- -->

    <!-- Monitor the root home directory — used in lab to trigger alerts -->
    <directories check_all="yes" report_changes="yes" realtime="yes">/root</directories>

    <!-- Monitor /etc for configuration file tampering -->
    <directories check_all="yes" report_changes="yes" realtime="yes">/etc</directories>

    <!-- Monitor /var/ossec/etc to detect agent config tampering -->
    <directories check_all="yes" report_changes="yes">/var/ossec/etc</directories>

    <!-- Monitor /tmp — common malware staging directory -->
    <directories check_all="yes" realtime="yes">/tmp</directories>

    <!-- -------------------------------------------------------
         Exclusions — avoid monitoring noisy or irrelevant paths
         ------------------------------------------------------- -->
    <ignore>/proc</ignore>
    <ignore>/sys</ignore>
    <ignore>/dev</ignore>
    <ignore>/run</ignore>
    <ignore type="sregex">.log$|.tmp$|.swp$</ignore>

    <!-- -------------------------------------------------------
         Alert configuration
         ------------------------------------------------------- -->
    <!-- Report changes in real time using inotify -->
    <auto_ignore frequency="10" timeframe="3600">no</auto_ignore>

    <!-- Alert on new files (important for malware drop detection) -->
    <alert_new_files>yes</alert_new_files>

  </syscheck>

</ossec_config>
