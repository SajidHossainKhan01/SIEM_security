<!-- ==========================================================================
     ossec_syscheck.conf — Windows Agent FIM Configuration
     CSE804: Network and Internet Security — Task 3
     
     This snippet adds a custom FIM directory inside the <ossec_config> block
     of the Wazuh agent configuration file located at:
       C:\Program Files (x86)\ossec-agent\ossec.conf
     
     APPLY ON: Windows 11 Wazuh Agent (IP: 10.33.3.7)
     
     After editing, restart the Wazuh service via PowerShell (admin):
       Restart-Service -Name wazuh
     ========================================================================== -->

<ossec_config>

  <!-- =========================================================
       File Integrity Monitoring (FIM) — syscheck configuration
       ========================================================= -->
  <syscheck>

    <!-- FIM is enabled -->
    <disabled>no</disabled>

    <!-- Scan frequency: every 300 seconds (5 minutes) — lower for lab testing -->
    <frequency>300</frequency>

    <!-- Scan on agent startup -->
    <scan_on_start>yes</scan_on_start>

    <!-- -------------------------------------------------------
         Default Windows directories monitored by Wazuh
         (these are included in the standard Wazuh Windows config)
         ------------------------------------------------------- -->
    <directories recursion_level="0" restrict="regedit.exe|system.ini|win.ini">%WINDIR%</directories>

    <directories recursion_level="0"
      restrict="at.exe|attrib.exe|cacls.exe|cmd.exe|eventcreate.exe|ftp.exe|lsass.exe|net.exe|net1.exe|netsh.exe|reg.exe|regedt32.exe|regsvr32.exe|runas.exe|sc.exe|schtasks.exe|sethc.exe|subst.exe">
      %WINDIR%\SysNative
    </directories>

    <!-- -------------------------------------------------------
         CUSTOM: Monitor the student Desktop directory
         This is the target directory for our lab FIM test.
         
         Attributes:
           check_all="yes"        — hash + permissions + owner checks
           report_changes="yes"   — show text diff for modified files
           realtime="yes"         — real-time change detection
         ------------------------------------------------------- -->
    <directories check_all="yes" report_changes="yes" realtime="yes">
      C:\Users\student\Desktop
    </directories>

    <!-- Additional monitored paths — common malware drop locations -->
    <directories check_all="yes" realtime="yes">%TEMP%</directories>
    <directories check_all="yes" realtime="yes">%USERPROFILE%\Downloads</directories>

    <!-- -------------------------------------------------------
         Exclusions
         ------------------------------------------------------- -->
    <ignore>%PROGRAMDATA%\Microsoft\Windows Defender</ignore>
    <ignore type="sregex">.log$|.tmp$|.etl$</ignore>

    <!-- Alert on new file creation -->
    <alert_new_files>yes</alert_new_files>

  </syscheck>

  <!-- =========================================================
       Sysmon Integration — collect Sysmon Event Channel
       Required for Task 2 detection (process creation, file drops)
       ========================================================= -->
  <localfile>
    <location>Microsoft-Windows-Sysmon/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

</ossec_config>
